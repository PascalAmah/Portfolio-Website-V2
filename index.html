<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pascal Amaliri — Software Engineer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ["DM Sans", "sans-serif"],
              display: ["Syne", "sans-serif"],
              mono: ["DM Mono", "monospace"],
            },
            colors: {
              // Base colors - light and dark modes
              background: "rgb(var(--color-background) / <alpha-value>)",
              surface: "rgb(var(--color-surface) / <alpha-value>)",
              surfaceHighlight:
                "rgb(var(--color-surface-highlight) / <alpha-value>)",
              border: "rgb(var(--color-border) / <alpha-value>)",
              borderHover: "rgb(var(--color-border-hover) / <alpha-value>)",

              // Accent colors
              accent: {
                DEFAULT: "#C9A227",
                hover: "#B8911F",
                light: "#E6B84D",
                dark: "#A67C1A",
              },

              // Text colors with WCAG compliant contrast
              text: {
                primary: "rgb(var(--color-text-primary) / <alpha-value>)",
                secondary: "rgb(var(--color-text-secondary) / <alpha-value>)",
                tertiary: "rgb(var(--color-text-tertiary) / <alpha-value>)",
                muted: "rgb(var(--color-text-muted) / <alpha-value>)",
              },
            },
            borderRadius: {
              sm: "0.5rem", // 8px
              DEFAULT: "0.75rem", // 12px
              md: "1rem", // 16px
              lg: "1.5rem", // 24px
              xl: "2rem", // 32px
              "2xl": "2.5rem", // 40px
              "3xl": "3rem", // 48px
            },
            boxShadow: {
              sm: "0 2px 8px rgba(0, 0, 0, 0.4)",
              DEFAULT: "0 4px 16px rgba(0, 0, 0, 0.5)",
              md: "0 8px 24px rgba(0, 0, 0, 0.6)",
              lg: "0 16px 48px rgba(0, 0, 0, 0.7)",
              xl: "0 24px 64px rgba(0, 0, 0, 0.8)",
              accent: "0 0 20px rgba(255, 209, 102, 0.3)",
              "accent-lg": "0 0 40px rgba(255, 209, 102, 0.4)",
            },
            spacing: {
              18: "4.5rem", // 72px
              22: "5.5rem", // 88px
              26: "6.5rem", // 104px
              30: "7.5rem", // 120px
            },
            fontSize: {
              xs: ["0.75rem", { lineHeight: "1rem" }], // 12px
              sm: ["0.875rem", { lineHeight: "1.25rem" }], // 14px
              base: ["1rem", { lineHeight: "1.5rem" }], // 16px
              lg: ["1.125rem", { lineHeight: "1.75rem" }], // 18px
              xl: ["1.25rem", { lineHeight: "1.75rem" }], // 20px
              "2xl": ["1.5rem", { lineHeight: "2rem" }], // 24px
              "3xl": ["1.875rem", { lineHeight: "2.25rem" }], // 30px
              "4xl": ["2.25rem", { lineHeight: "2.5rem" }], // 36px
              "5xl": ["3rem", { lineHeight: "1" }], // 48px
              "6xl": ["3.75rem", { lineHeight: "1" }], // 60px
              "7xl": ["4.5rem", { lineHeight: "1" }], // 72px
            },
            transitionDuration: {
              400: "400ms",
            },
          },
        },
      };
    </script>
    <style>
      :root {
        /* Light mode colors (default) - Off-white theme */
        --color-background: 250 248 244; /* #faf8f4 - warm off-white */
        --color-surface: 245 242 238; /* #f5f2ee - light cream */
        --color-surface-highlight: 235 230 224; /* #ebe6e0 - slightly darker cream */
        --color-border: 200 190 180; /* #c8beb4 - soft tan */
        --color-border-hover: 170 155 140; /* #aa9b8c - warmer tan */
        --color-text-primary: 8 6 4; /* #080604 - nearly black */
        --color-text-secondary: 40 35 30; /* #282320 - dark warm gray */
        --color-text-tertiary: 85 80 75; /* #55504b - warm gray */
        --color-text-muted: 120 115 110; /* #78736e - lighter warm gray */
      }

      html.dark {
        /* Dark mode colors */
        --color-background: 10 10 10; /* #0a0a0a */
        --color-surface: 18 18 18; /* #121212 */
        --color-surface-highlight: 26 26 26; /* #1a1a1a */
        --color-border: 42 42 42; /* #2a2a2a */
        --color-border-hover: 64 64 64; /* #404040 */
        --color-text-primary: 255 255 255; /* #ffffff */
        --color-text-secondary: 212 212 212; /* #d4d4d4 */
        --color-text-tertiary: 163 163 163; /* #a3a3a3 */
        --color-text-muted: 115 115 115; /* #737373 */
      }

      * {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        background-color: rgb(var(--color-background));
        color: rgb(var(--color-text-secondary));
        overflow-x: hidden;
        transition:
          background-color 0.3s ease,
          color 0.3s ease;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 10px;
      }
      ::-webkit-scrollbar-track {
        background: rgb(var(--color-background));
      }
      ::-webkit-scrollbar-thumb {
        background: rgb(var(--color-border));
        border-radius: 5px;
        border: 2px solid rgb(var(--color-background));
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgb(var(--color-border-hover));
      }

      /* Focus visible styles for accessibility */
      *:focus-visible {
        outline: 2px solid #ffd166;
        outline-offset: 2px;
      }

      /* Smooth scrolling */
      html {
        scroll-behavior: smooth;
      }

      @media (prefers-reduced-motion: reduce) {
        html {
          scroll-behavior: auto;
        }
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "react/": "https://aistudiocdn.com/react@^19.2.0/",
          "react": "https://aistudiocdn.com/react@^19.2.0",
          "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
          "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
          "gsap": "https://esm.sh/gsap"
        }
      }
    </script>
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
